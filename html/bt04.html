<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ứng dụng web bt04.html</title>
</head>
<body>
    <table border="1" width="80%" align="center" cellspacing="2" cellpadding="10">
        <caption><h3>KẾT QUẢ HỌC TẬP</h3></caption>
        <thead style="background-color: rgb(209, 206, 206);">
            <tr>
                <th rowspan="2">Họ tên</th>
                <th colspan="3">Môn học</th>
                <th rowspan="2">Kết quả</th>
            </tr>
            <tr>
                <th width="19%">Toán</th>
                <th width="19%">Văn</th>
                <th width="19%">Ngoại Ngữ</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Trần Văn Thành</td>
                <td align="center">8</td>
                <td align="center">5</td>
                <td align="center">7</td>
                <td align="center" style="background-color: yellow;">Đạt</td>
            </tr>
            <tr>
                <td>Lê Thanh Sơn</td>
                <td align="center">4</td>
                <td align="center">9</td>
                <td align="center">6</td>
                <td align="center" style="background-color: red; color: white;">Không đạt</td>
            </tr>
            <tr>
                <td>Nguyễn Thị Tuyết</td>
                <td align="center">8</td>
                <td align="center">9</td>
                <td align="center">5</td>
                <td align="center" style="background-color: yellow;">Đạt</td>
            </tr>
            <tr>
                <td colspan="4">Tổng số học sinh đạt</td>
                <td align="center">2</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
